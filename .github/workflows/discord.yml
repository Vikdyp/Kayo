name: Discord notify

on:
  push:
    branches: [ "master", "main", "dev" ]
  pull_request:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord message
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref_name }}
          URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          MSG: ${{ github.event.head_commit.message || github.event.pull_request.title }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          content = (
              f"📌 **{os.environ['REPO']}** — push par **{os.environ['ACTOR']}** sur **{os.environ['REF']}**\n"
              f"📝 {os.environ.get('MSG') or '(message indisponible)'}\n"
              f"🔗 {os.environ['URL']}"
          )
          Path("payload.json").write_text(json.dumps({"content": content}), encoding="utf-8")
          PY
          curl -H "Content-Type: application/json" --data-binary @payload.json "$WEBHOOK"
